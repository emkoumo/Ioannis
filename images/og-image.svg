<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#07071A"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E23636" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E23636" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0C040" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F0C040" stop-opacity="0"/>
    </radialGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glows -->
  <ellipse cx="600" cy="420" rx="500" ry="250" fill="url(#glow1)"/>
  <ellipse cx="600" cy="220" rx="380" ry="180" fill="url(#glow2)"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="5" fill="#E23636"/>
  <!-- Bottom border accent -->
  <rect x="0" y="625" width="1200" height="5" fill="#E23636"/>

  <!-- Stars -->
  <circle cx="80"  cy="60"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="200" cy="30"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="350" cy="80"  r="2"   fill="white" opacity="0.6"/>
  <circle cx="500" cy="20"  r="1.5" fill="white" opacity="0.4"/>
  <circle cx="700" cy="55"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="900" cy="35"  r="2"   fill="white" opacity="0.5"/>
  <circle cx="1050" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1150" cy="25" r="1"   fill="white" opacity="0.4"/>
  <circle cx="130" cy="570" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="280" cy="590" r="1"   fill="white" opacity="0.4"/>
  <circle cx="950" cy="580" r="2"   fill="white" opacity="0.6"/>
  <circle cx="1100" cy="560" r="1.5" fill="white" opacity="0.5"/>

  <!-- Avengers "A" shield decoration left -->
  <polygon points="120,180 160,120 200,180" fill="none" stroke="#E23636" stroke-width="3" opacity="0.4"/>
  <line x1="130" y1="165" x2="190" y2="165" stroke="#E23636" stroke-width="2" opacity="0.4"/>

  <!-- Avengers "A" shield decoration right -->
  <polygon points="1000,180 1040,120 1080,180" fill="none" stroke="#E23636" stroke-width="3" opacity="0.4"/>
  <line x1="1010" y1="165" x2="1070" y2="165" stroke="#E23636" stroke-width="2" opacity="0.4"/>

  <!-- Small label above title -->
  <text x="600" y="140" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="22" font-weight="900" letter-spacing="10" fill="#E23636" opacity="0.9">
    AVENGERS BIRTHDAY MISSION
  </text>

  <!-- Main title: ΙΩΑΝΝΗΣ -->
  <text x="600" y="270" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="130" font-weight="900" letter-spacing="8" fill="#F0C040"
        filter="url(#goldglow)">ΙΩΑΝΝΗΣ</text>

  <!-- Subtitle -->
  <text x="600" y="345" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="38" font-weight="700" letter-spacing="6" fill="white" opacity="0.9">
    ΓΕΝΕΘΛΙΑ  ·  AVENGERS  PARTY
  </text>

  <!-- Divider line -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="#F0C040" stroke-width="1.5" opacity="0.4"/>

  <!-- Date / Time / Location -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="28" font-weight="600" letter-spacing="3" fill="white" opacity="0.85">
    20 ΑΠΡΙΛΙΟΥ 2026  ·  17:30
  </text>
  <text x="600" y="480" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="26" font-weight="400" letter-spacing="2" fill="#F0C040" opacity="0.8">
    Li La Lo, Κατερίνη
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="570" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="18" font-weight="700" letter-spacing="5" fill="white" opacity="0.35">
    ASSEMBLE!
  </text>
</svg>
